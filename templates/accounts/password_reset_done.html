{% extends "base.html" %}
{% block title %}Xác nhận mã OTP | GeoEstate{% endblock %}

{% block content %}
<div class="container py-5" style="max-width:640px">
  <div class="card-geo p-4 p-md-5">
    <div class="text-center mb-4">
        <p class="section-eyebrow">Bước 2: Xác thực</p>
        <h1 class="section-heading h2">Nhập mã 6 số</h1>
        <p class="text-muted">Chúng tôi đã gửi mã đến email: <strong>{{ email }}</strong></p>
    </div>
    
    <form method="post" action="{% url 'accounts:password_reset_done' %}" class="d-flex flex-column gap-3">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label fw-bold">Mã xác nhận</label>
            <input type="text" name="code" class="form-geo text-center" 
                   style="letter-spacing: 10px; font-size: 24px; font-weight: bold;" 
                   maxlength="6" placeholder="000000" required>
        </div>
        <button type="submit" class="btn-geo-primary justify-content-center">Tiếp theo</button>
    </form>
  </div>
</div>
{% endblock %}
