{% extends "base.html" %}
{% block title %}Quên mật khẩu | GeoEstate{% endblock %}

{% block content %}
<div class="container py-5" style="max-width:640px">
  <div class="card-geo p-4 p-md-5">
    <p class="section-eyebrow">Khôi phục quyền truy cập</p>
    <h1 class="section-heading mb-4">Quên mật khẩu?</h1>
    <p style="color:var(--text-muted);margin-bottom:24px">Nhập email của bạn. Chúng tôi sẽ gửi một mã xác nhận 6 số để bạn thiết lập lại mật khẩu.</p>
    
    <form method="post" action="{% url 'accounts:password_reset' %}" class="d-flex flex-column gap-3">
        {% csrf_token %}
        <div>
            <label class="form-label">Email đăng ký</label>
            <input type="email" name="email" class="form-geo" placeholder="name@example.com" required>
        </div>
        <button type="submit" class="btn-geo-primary justify-content-center">Gửi mã xác nhận</button>
    </form>
    <div class="mt-4">
        <a href="{% url 'accounts:login' %}" style="color:var(--gold);text-decoration:none"><i class="bi bi-arrow-left"></i> Quay lại đăng nhập</a>
    </div>
  </div>
</div>
{% endblock %}
