{% extends "base.html" %}
{% block title %}Đổi mật khẩu mới | GeoEstate{% endblock %}

{% block content %}
<div class="container py-5" style="max-width:640px">
  <div class="card-geo p-4 p-md-5">
    <div class="text-center mb-4">
        <p class="section-eyebrow">Bước cuối</p>
        <h1 class="section-heading h2">Thiết lập mật khẩu mới</h1>
    </div>
    
    <form method="post" action="{% url 'accounts:password_reset_confirm' %}" class="d-flex flex-column gap-3">
        {% csrf_token %}
        <div>
            <label class="form-label">Mật khẩu mới</label>
            <input type="password" name="password" class="form-geo" required placeholder="Nhập ít nhất 8 ký tự">
        </div>
        <button type="submit" class="btn-geo-primary justify-content-center">Hoàn tất đổi mật khẩu</button>
    </form>
  </div>
</div>
{% endblock %}
